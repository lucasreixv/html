<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Trabalhe Conosco</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Great+Vibes&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins', sans-serif;
}

body{
    background: linear-gradient(135deg,#f8ecee,#f4dfe3);
    padding:40px;
    color:#5f4b53;
}

.container{
    background:#fff9fa;
    max-width:1200px;
    margin:auto;
    padding:40px;
    border-radius:25px;
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

h1{
    font-family:'Great Vibes', cursive;
    font-size:70px;
    margin-bottom:30px;
    color:#7b5c65;
}

.section-title{
    display:flex;
    align-items:center;
    gap:10px;
    font-size:35px;
    margin:35px 0 20px;
    font-weight:600;
}

.form-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.input-box{
    position:relative;
}

.input-box label{
    display:block;
    margin-bottom:8px;
    font-weight:500;
}

.input-box input{
    width:100%;
    padding:16px 18px 16px 50px;
    border:none;
    border-radius:18px;
    background:#fff;
    box-shadow:
        inset 2px 2px 5px rgba(0,0,0,0.05),
        inset -2px -2px 5px rgba(255,255,255,0.8);
    font-size:15px;
    outline:none;
    transition:0.3s;
}

.input-box input:focus{
    transform:scale(1.02);
    box-shadow:0 0 0 3px #f2cfd6;
}

.icon{
    position:absolute;
    left:18px;
    top:47px;
    font-size:18px;
    color:#c295a1;
}

.gender{
    display:flex;
    gap:15px;
    flex-wrap:wrap;
    margin-top:10px;
}

.gender button{
    border:none;
    padding:14px 25px;
    border-radius:15px;
    cursor:pointer;
    font-size:15px;
    font-weight:500;
    transition:0.3s;
}

.fem{
    background:#ffe4ea;
    color:#d35b7c;
}

.masc{
    background:#dff1ff;
    color:#4381c7;
}

.outro{
    background:#f3f3f3;
    color:#666;
}

.gender button:hover{
    transform:translateY(-3px);
}

.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:18px;
    margin-top:15px;
}

.card{
    background:white;
    border-radius:20px;
    padding:25px;
    cursor:pointer;
    transition:0.3s;
    border:2px solid transparent;
    box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

.card:hover{
    transform:translateY(-5px);
    border-color:#e8c2cb;
}

.card-title{
    display:flex;
    align-items:center;
    gap:10px;
    font-weight:500;
    font-size:18px;
}

/* RADIO BUTTON ROSA */

.card input[type="radio"]{
    appearance:none;
    width:20px;
    height:20px;
    border:2px solid #d9a8b4;
    border-radius:50%;
    position:relative;
    cursor:pointer;
    transition:0.3s;
}

.card input[type="radio"]:checked{
    border-color:#d87093;
}

.card input[type="radio"]:checked::before{
    content:"";
    width:10px;
    height:10px;
    background:#d87093;
    border-radius:50%;
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%, -50%);
}

/* CHECKBOX */

.special{
    display:flex;
    align-items:center;
    gap:10px;
    font-size:18px;
    font-weight:500;
}

.special input[type="checkbox"]{
    width:18px;
    height:18px;
    accent-color:#d87093;
}

</style>
</head>

<body>

<div class="container">

<h1>Trabalhe Conosco</h1>

<div class="section-title">
👤 Dados pessoais
</div>

<div class="form-grid">

<div class="input-box">
<label>Nome completo</label>
<span class="icon">👤</span>
<input type="text" placeholder="Digite seu nome completo">
</div>

<div class="input-box">
<label>Endereço</label>
<span class="icon">📍</span>
<input type="text" placeholder="Digite seu endereço">
</div>

<div class="input-box">
<label>Cidade</label>
<span class="icon">🏙️</span>
<input type="text" placeholder="Digite sua cidade">
</div>

<div class="input-box">
<label>CEP</label>
<span class="icon">✉️</span>
<input type="text" placeholder="Digite seu CEP">
</div>

<div class="input-box">
<label>WhatsApp</label>
<span class="icon">📱</span>
<input type="text" placeholder="Digite seu WhatsApp">
</div>

<div class="input-box">
<label>Login</label>
<span class="icon">🧑</span>
<input type="text" placeholder="Escolha seu login">
</div>

<div class="input-box">
<label>Senha</label>
<span class="icon">🔒</span>
<input type="password" placeholder="Crie sua senha">
</div>

</div>

<br><br>

<label style="font-weight:600;">Gênero</label>

<div class="gender">
<button class="fem">♀ Feminino</button>
<button class="masc">♂ Masculino</button>
<button class="outro">Outro</button>
</div>

<div class="section-title">
🎓 Graduação Escolar
</div>

<div class="cards">

<label class="card">
<div class="card-title">
<input type="radio" name="grad">
Fundamental Incompleto
</div>
</label>

<label class="card">
<div class="card-title">
<input type="radio" name="grad">
Fundamental Completo
</div>
</label>

<label class="card">
<div class="card-title">
<input type="radio" name="grad">
Médio Completo
</div>
</label>

<label class="card">
<div class="card-title">
<input type="radio" name="grad">
Superior Completo
</div>
</label>

</div>

<div class="section-title">
🏅 Especialização
</div>

<div class="cards">

<label class="card special">
<input type="checkbox">
Ensino Técnico
</label>

<label class="card special">
<input type="checkbox">
Inglês
</label>

<label class="card special">
<input type="checkbox">
Certificação Técnica
</label>

<label class="card special">
<input type="checkbox">
Bacharelado
</label>

</div>

</div>

</body>
</html>
